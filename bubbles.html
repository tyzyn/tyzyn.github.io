<!DOCTYPE html>
<html lang="en">
<head>
  <title>SOCM029 CA2</title>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="./theme/css/main.css" type="text/css"/>
  <link rel="stylesheet" href="https://rawgit.com/tpreusse/radar-chart-d3/master/src/radar-chart.css">
  
  <script src="https://d3js.org/d3.v3.min.js"></script>
  <script src="https://rawgit.com/tpreusse/radar-chart-d3/master/src/radar-chart.js"></script>
  
  <style>
    .bubblecontainer {
      float: left;
      margin: 10px;
    }
    .detailcontainer {
      float: right;
      margin: 10px;
    }
  </style>
  
  <style>
    .radar-chart .area {
      fill-opacity: 0.7;
    }
    .radar-chart.focus .area {
      fill-opacity: 0.3;
    }
    .radar-chart.focus .area.focused {
      fill-opacity: 0.9;
    }
    .area.germany, .germany .circle {
      fill: #FFD700;
      stroke: none;
    }
    .area.argentina, .argentina .circle {
      fill: #ADD8E6;
      stroke: none;
    }
  </style>
</head>

<body>
  
  <script>
    RadarChart.defaultConfig.color = function() {};
    RadarChart.defaultConfig.radius = 3;
    RadarChart.defaultConfig.w = 400;
    RadarChart.defaultConfig.h = 400;
  </script>
  
  <script>
    var data = [
      {
        className: 'germany', // optional can be used for styling
        axes: [
          {axis: "strength", value: 13}, 
          {axis: "intelligence", value: 6}, 
          {axis: "charisma", value: 5},  
          {axis: "dexterity", value: 9},  
          {axis: "luck", value: 2}
        ]
      },
      {
        className: 'argentina',
        axes: [
          {axis: "strength", value: 6}, 
          {axis: "intelligence", value: 7}, 
          {axis: "charisma", value: 10},  
          {axis: "dexterity", value: 13},  
          {axis: "luck", value: 9}
        ]
      }
    ];
    
    function randomDataset() {
      return data.map(function(d) {
        return {
          className: d.className,
          axes: d.axes.map(function(axis) {
            return {axis: axis.axis, value: Math.ceil(Math.random() * 10)};
          })
        };
      });
    }
  </script>

  <h2>Top 2000 Phrases taken from Coronavirus Tweets</h2>
  
  <div class="bubblecontainer" id="chart1">
  </div>
  <div class="detailcontainer" id="chart2">
    <h2><span id="value">Hover over a circle to see a key phrase.</span></h2>
  </div>
  
<script>
  var width = parseInt(screen.width * 0.9),
      height = parseInt(screen.height * 0.8);
  
  var svg1 = d3.select("#chart1").append("svg")
  .attr("width", height)
  .attr("height", height);

  d3.json("bubble_data.json", function(bubbles) {
    var w = height / bubbles['imsize'];
    
    var circles = svg1.selectAll("circle")
    .data(bubbles.nodes)
    .enter().append("circle")
    .on('mouseover', handleMouseOver)
    .on('mouseout', handleMouseRemove);
    
    var circleAttributes = circles
    .attr("cx", function (d) { return d['im_x'] * w; })
    .attr("cy", function (d) { return d['im_y'] * w; })
    .attr("r", function (d) { return d['r'] * 8.3; })
    .style("fill", function(d) { return d.c; });
  });
  
  function handleMouseRemove(d, i) {
    var output = document.getElementById("value");
    output.innerHTML = "Hover over a circle to see a key phrase.";
  };
  
  function handleMouseOver(d, i) {
    var s = d['c'];
    var output = document.getElementById("value");
    output.innerHTML = s;
  };
</script>
  
<script>
RadarChart.defaultConfig.color = function() {};
RadarChart.defaultConfig.radius = 3;
RadarChart.defaultConfig.w = 400;
RadarChart.defaultConfig.h = 400;
</script>

<span></span>

<script>
var data = [
  {
    className: 'germany', // optional can be used for styling
    axes: [
      {axis: "strength", value: 13}, 
      {axis: "intelligence", value: 6}, 
      {axis: "charisma", value: 5},  
      {axis: "dexterity", value: 9},  
      {axis: "luck", value: 2}
    ]
  },
  {
    className: 'argentina',
    axes: [
      {axis: "strength", value: 6}, 
      {axis: "intelligence", value: 7}, 
      {axis: "charisma", value: 10},  
      {axis: "dexterity", value: 13},  
      {axis: "luck", value: 9}
    ]
  }
];
function randomDataset() {
  return data.map(function(d) {
    return {
      className: d.className,
      axes: d.axes.map(function(axis) {
        return {axis: axis.axis, value: Math.ceil(Math.random() * 10)};
      })
    };
  });
}
</script>

<script>
var chart = RadarChart.chart();
var cfg = chart.config(); // retrieve default config
var svg = d3.select('body').append('svg')
  .attr('width', cfg.w + cfg.w + 50)
  .attr('height', cfg.h + cfg.h / 4);
svg.append('g').classed('single', 1).datum(randomDataset()).call(chart);
</script>

</body>
</html>
