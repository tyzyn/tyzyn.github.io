<!DOCTYPE html>
<html lang="en">
<head>
  <title>SOCM029 CA2</title>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="./theme/css/main.css" type="text/css" />
  <script src="https://d3js.org/d3.v4.min.js"></script>
  
  <style>
    .slidecontainer {
      width: 100%;
    }

    .slider {
      -webkit-appearance: none;
      width: 100%;
      height: 25px;
      background: #d3d3d3;
      outline: none;
      opacity: 0.7;
      -webkit-transition: .2s;
      transition: opacity .2s;
    }

    .slider:hover {
      opacity: 1;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 25px;
      height: 25px;
      background: #4CAF50;
      cursor: pointer;
    }

    .slider::-moz-range-thumb {
      width: 25px;
      height: 25px;
      background: #4CAF50;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <p>Hello World 3</p>
  
  <div class="slidecontainer">
    
    <input type="range" min="1" max="100" value="50">
    
  </div>
  
  <script type="text/javascript" src="/time_net.js"></script>

  <div id="footer">
    <div id="credits">
      <li><span>Adapted from <a href="http://wordpress.org/themes/monospace">Monospace</a> | Created with <a href="https://github.com/getpelican/pelican">Pelican</a></span><li>
    </div>
  </div>

</body>
</html>
