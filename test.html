<!DOCTYPE html>
<html lang="en">
<head>
  <title>SOCM029 CA2</title>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="./theme/css/main.css" type="text/css" />
  <script src="https://d3js.org/d3.v3.min.js"></script>
  
  <style>
    .slidecontainer {
      width: 100%;
    }

    .slider {
      -webkit-appearance: none;
      width: 95%;
      height: 25px;
      background: #d3d3d3;
      outline: none;
      opacity: 0.7;
      -webkit-transition: .2s;
      transition: opacity .2s;
    }

    .slider:hover {
      opacity: 1;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 25px;
      height: 25px;
      background: #26A65B;
      cursor: pointer;
    }

    .slider::-moz-range-thumb {
      width: 25px;
      height: 25px;
      background: #26A65B;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2><span id="value"></span></h2>
  
  <div class="slidecontainer">
    
    <input type="range" min="1577836800000" max="1585699199000" value="1577836800000" id="dateslider" class="slider">
    
  </div>
  
  <script type="text/javascript" src="/time_net.js"></script>
  
  <script>
    
    var slider = document.getElementById("dateslider");
    var output = document.getElementById("value");
    output.innerHTML = slider.value;

    slider.oninput = function() {
      var d = new Date(parseInt(slider.value));
      var ye = new Intl.DateTimeFormat('en', { year: 'numeric' }).format(d);
      var mo = new Intl.DateTimeFormat('en', { month: 'short' }).format(d);
      var da = new Intl.DateTimeFormat('en', { day: '2-digit' }).format(d);
      
      output.innerHTML = `${da} ${mo} ${ye}`;
    }
  </script>
  
<script>
  var width = parseInt(screen.width * 0.9),
      height = parseInt(screen.width * 0.8);

  var svg = d3.select("body").append("svg")
      .attr("width", width)
      .attr("height", height);

  var force = d3.layout.force()
      .gravity(.05)
      .distance(100)
      .charge(-100)
      .size([width, height]);

  d3.json("testgraph.json", function(json) {
    force
        .nodes(json.nodes)
        .links(json.links)
        .start();

    var link = svg.selectAll(".link")
        .data(json.links)
      .enter().append("line")
        .attr("class", "link")
        .attr("stroke", "#999")
        .attr("stroke-opacity", 0.6);

    var node = svg.selectAll(".node")
        .data(json.nodes)
      .enter().append("g")
        .attr("class", "node")
        .call(force.drag);

    node.append("circle")
        .attr("r","5");

    force.on("tick", function() {
      link.attr("x1", function(d) { return d.source.x; })
          .attr("y1", function(d) { return d.source.y; })
          .attr("x2", function(d) { return d.target.x; })
          .attr("y2", function(d) { return d.target.y; });

      node.attr("transform", function(d) { return "translate(" + d.x + "," + d.y + ")"; });
    });
  });
</script>

</body>
</html>
