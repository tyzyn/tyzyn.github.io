<!DOCTYPE html>
<html lang="en">
<head>
  <title>SOCM029 CA2</title>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="./theme/css/main.css" type="text/css" />
  <script src="https://d3js.org/d3.v4.min.js"></script>
  
  <style>
    .slidecontainer {
      width: 100%;
    }

    .slider {
      -webkit-appearance: none;
      width: 95%;
      height: 25px;
      background: #d3d3d3;
      outline: none;
      opacity: 0.7;
      -webkit-transition: .2s;
      transition: opacity .2s;
    }

    .slider:hover {
      opacity: 1;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 25px;
      height: 25px;
      background: #4CAF50;
      cursor: pointer;
    }

    .slider::-moz-range-thumb {
      width: 25px;
      height: 25px;
      background: #4CAF50;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2><span id="value"></span></h2>
  
  <div class="slidecontainer">
    
    <input type="range" min="1577836800000" max="1585699199000" value="1577836800000" id="dateslider" class="slider">
    
  </div>
  
  <script type="text/javascript" src="/time_net.js"></script>
  
  <script>
    
    var slider = document.getElementById("dateslider");
    var output = document.getElementById("value");
    output.innerHTML = slider.value;

    slider.oninput = function() {
      var d = new Date(parseInt(slider.value));
      var ye = new Intl.DateTimeFormat('en', { year: 'numeric' }).format(d);
      var mo = new Intl.DateTimeFormat('en', { month: 'short' }).format(d);
      var da = new Intl.DateTimeFormat('en', { day: '2-digit' }).format(d);
      
      output.innerHTML = `${da} ${mo} ${ye}`;
    }
  </script>

</body>
</html>
